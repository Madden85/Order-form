<!DOCTYPE html><html lang="ms"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Create Order - NM Ventures</title>    <style>        body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff;text-align:center;}        .wrap{width:92%;max-width:480px;margin:auto;padding:20px 0;}        .card{background:#161616;padding:18px;border-radius:14px;margin-bottom:15px;}        input,select,textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;background:#222;color:#fff;box-sizing: border-box;}        textarea{height:150px;white-space:pre-line;}        .btn{width:100%;padding:13px;margin-top:10px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;display:block;text-decoration:none;}        .btn-primary{background:#e50914;color:#fff;}        .btn-green{background:#0f9d58;color:#fff;}        .output{white-space:pre-line;text-align:left;background:#000;padding:15px;border-radius:10px;margin-top:15px; font-size: 14px;}        .hidden{display:none;}        h2{margin-bottom: 5px;}    </style></head><body><div class="wrap">    <h2>CREATE ORDER</h2>    <div class="card">        <input id="orderNo" type="hidden">        <select id="product" onchange="renderForm()">            <option value="">Pilih Produk</option>            <option value="netflix">Netflix Premium Private Profile</option>            <option value="youtube">Youtube Premium</option>            <option value="sooka">Sooka Premium</option>            <option value="spotify">Spotify Premium</option>            <option value="iqiyi">iQIYI Premium</option>            <option value="disney">Disney+ Hotstar</option>            <option value="viu">Viu Premium</option>        </select>                <div id="form"></div>                <button class="btn btn-primary" id="submitBtn">SUBMIT</button>                <div id="result" class="output hidden"></div>                <a id="openTelegram" class="btn btn-green hidden" target="_blank">HANTAR KE CUSTOMER</a>    </div></div><script src="app.js?v=11"></script></body></html>
